<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Genre Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f0f0f0; /* Light gray background */
            background-image: url('https://z-cdn-media.chatglm.cn/files/f531a0a0-7691-4797-a611-f2f6785848d7_list-of-book-genres-reading_210739.png?auth_key=1791212287-c19b8f22826941148a02e375ea43e22b-0-6aaa56de96bb25723f9bf85fa12a8b1d');
            background-size: cover; 
            background-repeat: no-repeat;
            background-position: center center; 
            background-attachment: fixed; 
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 60px auto 0;
            background: rgba(232, 232, 232, 0.7); 
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            color: #3f51b5;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        button {
            background: #3f51b5;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background: #303f9f;
        }
        .result {
            margin-top: 15px;
            padding: 12px;
            border-left: 4px solid #3f51b5;
            background: rgba(211, 211, 211, 0.6);
            display: none;
        }
        .result h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .result p {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .history {
            margin-top: 20px;
        }
        .history h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .history-item {
            padding: 8px;
            border-bottom: 1px solid rgba(204, 204, 204, 0.5);
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .genre-tag {
            background: rgba(197, 202, 233, 0.7);
            color: #0d47a1;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Book Genre Classifier</h1>
       <form id="bookForm">
            <div class="form-group">
                <label for="title">Book Title</label>
                <input type="text" id="title" required>
            </div>
             <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" required>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="3" required></textarea>
            </div>
           <button type="submit">Classify Book</button>
        </form>
    <div class="loading" id="loading">Classifying...</div>
     <div class="result" id="result">
            <h3>Classification Result</h3>
            <p><strong>Genre:</strong> <span id="genre"></span></p>
            <p><strong>Confidence:</strong> <span id="confidence"></span></p>
        </div>
        <div class="history">
            <h2>History</h2>
            <div id="historyList"></div>
        </div>
    </div>
 <script>
        // DOM elements
        const bookForm = document.getElementById('bookForm');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const genreEl = document.getElementById('genre');
        const confidenceEl = document.getElementById('confidence');
        const historyList = document.getElementById('historyList')
        const genres = ['Science Fiction', 'Fantasy', 'Mystery', 'Romance', 'Thriller', 'Horror', 'Biography'];
        const genreKeywords = {
            'Science Fiction': ['space', 'future', 'alien', 'robot', 'technology', 'galaxy', 'spaceship'],
            'Fantasy': ['magic', 'dragon', 'wizard', 'kingdom', 'sword', 'spell', 'medieval'],
            'Mystery': ['detective', 'crime', 'murder', 'investigation', 'clue', 'suspense'],
            'Romance': ['love', 'romance', 'relationship', 'heart', 'passion', 'emotion'],
            'Thriller': ['suspense', 'danger', 'chase', 'conspiracy', 'tension', 'fear'],
            'Horror': ['fear', 'terror', 'monster', 'ghost', 'haunted', 'supernatural'],
            'Biography': ['life', 'autobiography', 'memoir', 'story', 'experience', 'journey']
        };
        let history = [];
        bookForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const description = document.getElementById('description').value;
            loading.style.display = 'block';
            result.style.display = 'none';
            await new Promise(resolve => setTimeout(resolve, 1000));
            const classification = classifyBook(title, author, description);
            genreEl.textContent = classification.genre;
            confidenceEl.textContent = classification.confidence + '%';
         result.style.display = 'block';
        addToHistory(title, author, classification.genre);
            loading.style.display = 'none';
        });
        function classifyBook(title, author, description) {
            const text = (title + ' ' + author + ' ' + description).toLowerCase();
            const scores = {};
            for (const genre in genreKeywords) {
                scores[genre] = 0;
                genreKeywords[genre].forEach(keyword => {
                    if (text.includes(keyword)) {
                        scores[genre]++;
                    }
                });
            }
            let maxScore = 0;
            let classifiedGenre = genres[0]; // Default to first genre
             for (const genre in scores) {
                if (scores[genre] > maxScore) {
                    maxScore = scores[genre];
                    classifiedGenre = genre;
                }
            }
            if (maxScore === 0) {
                classifiedGenre = genres[Math.floor(Math.random() * genres.length)];
                maxScore = Math.floor(Math.random() * 3) + 1; // 1-3
            }
            const confidence = Math.min(95, 60 + (maxScore * 10));
           return { genre: classifiedGenre, confidence };
 }
        function addToHistory(title, author, genre) {
            history.unshift({ title, author, genre });
            renderHistory();
        }
function renderHistory() {
            historyList.innerHTML = '';
              if (history.length === 0) {
                historyList.innerHTML = '<p>No history yet</p>';
                return;
            }
            history.forEach(book => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div>
                        <strong>${book.title}</strong> by ${book.author}
                    </div>
                    <span class="genre-tag">${book.genre}</span>
                `;
                historyList.appendChild(item);
            });
        }
      renderHistory();
    </script>
</body>
</html>
